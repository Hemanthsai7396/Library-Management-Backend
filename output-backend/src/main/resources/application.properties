
spring.application.name=Library-Management

# Server
server.port=8000

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/klu?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Optional
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=super_secret_jwt_key_for_library_management_system_123456
app.jwt.expiration-ms=604800000

# Library Config
app.reservation.expiry-days=3
app.max-borrow-days=14

# Logging
logging.level.com.klef=INFO